spring:
  datasource:
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE DOMAIN IF NOT EXISTS user_role AS VARCHAR(50)\\;CREATE DOMAIN IF NOT EXISTS school_enum AS VARCHAR(50)\\;CREATE DOMAIN IF NOT EXISTS lms_source AS VARCHAR(50)\\;CREATE DOMAIN IF NOT EXISTS explanation_level AS VARCHAR(50)"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
