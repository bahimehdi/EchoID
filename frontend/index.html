<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EchoID Nexus</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 36px rgba(21, 32, 43, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.55;
        color: #536171;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>EchoID Nexus</h1>
      <p>Web service is reachable. The full frontend can replace this placeholder when UI development starts.</p>
    </main>
  </body>
</html>
