services:

  # ---------------------------------------------------------
  # DATABASE
  # PostgreSQL is the single source of truth for
  # all persistent data. It must be healthy before
  # backend or ai-service attempt to connect.
  # ---------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: echoid_postgres
    env_file:
      - ../env/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - echoid_net

  # ---------------------------------------------------------
  # BACKEND - Spring Boot (port 8080)
  # Waits for postgres to be healthy before starting.
  # Flyway migrations run automatically on startup.
  # ---------------------------------------------------------
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: echoid_backend
    env_file:
      - ../env/.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - echoid_net
    restart: on-failure

  # ---------------------------------------------------------
  # AI SERVICE - FastAPI (port 8000)
  # Also waits for postgres (for future DB reads).
  # Stateless - can be restarted freely.
  # ---------------------------------------------------------
  ai-service:
    build:
      context: ../../ai-service
      dockerfile: Dockerfile
    container_name: echoid_ai
    env_file:
      - ../env/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - echoid_net
    restart: on-failure

  # ---------------------------------------------------------
  # FRONTEND WEB - React (port 3000)
  # Professor and Admin dashboard.
  # Does not depend on DB directly - only on backend.
  # ---------------------------------------------------------
  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: echoid_web
    env_file:
      - ../env/.env
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - echoid_net

  # ---------------------------------------------------------
  # GRAFANA - Analytics dashboards (port 3001)
  # Reads from PostgreSQL directly.
  # Provisioning files auto-load datasource + dashboards
  # so no manual UI clicks are needed on startup.
  # ---------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: echoid_grafana
    env_file:
      - ../env/.env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - echoid_net

# ---------------------------------------------------------
# NAMED VOLUMES
# Declared here so Docker manages their lifecycle.
# These survive "docker-compose down".
# Use "docker-compose down -v" to wipe them (DESTRUCTIVE).
# ---------------------------------------------------------
volumes:
  pgdata:
    name: echoid_pgdata
  grafana_data:
    name: echoid_grafana_data

# ---------------------------------------------------------
# NETWORK
# All services share one private network.
# Services address each other by service name:
#   backend -> postgres:5432 (not localhost:5432)
#   backend -> ai-service:8000
# ---------------------------------------------------------
networks:
  echoid_net:
    name: echoid_net
    driver: bridge
