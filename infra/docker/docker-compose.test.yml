services:

  postgres:
    image: postgres:16
    container_name: echoid_test_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: echoid_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d echoid_test"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - echoid_test_net

  ai-service:
    build:
      context: ../../ai-service
      dockerfile: Dockerfile
    container_name: echoid_test_ai
    environment:
      AI_SERVICE_URL: http://localhost:8000
      GOOGLE_API_KEY: ""
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - echoid_test_net
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: echoid_test_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: echoid_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_JWT_SECRET: dGhpcyBpcyBhIHRlc3Qgc2VjcmV0IGZvciB0ZXN0aW5nIG9ubHk=
      APP_AI_SERVICE_URL: http://ai-service:8000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - echoid_test_net

  test-runner:
    image: alpine:3.19
    container_name: echoid_test_runner
    depends_on:
      backend:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - echoid_test_net
    command: >
      sh -c "
        echo '=== All services are up ===' &&
        echo 'Backend health: http://backend:8080/api/admin/health' &&
        echo 'AI service: http://ai-service:8000/docs' &&
        echo 'Running smoke tests...' &&
        wget -qO- http://backend:8080/api/admin/health &&
        echo '' &&
        wget -qO- http://ai-service:8000/health &&
        echo '' &&
        echo '=== Smoke tests passed ==='
      "

networks:
  echoid_test_net:
    name: echoid_test_net
    driver: bridge
