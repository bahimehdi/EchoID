apiVersion: 1

datasources:
  - name: EchoID-PG
    type: postgres
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    database: ${POSTGRES_DB}
    jsonData:
      sslmode: 'disable'
      postgresVersion: 1600
    isDefault: true
    editable: true
